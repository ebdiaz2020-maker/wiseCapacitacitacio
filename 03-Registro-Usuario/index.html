<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Appwise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Únete a la Comunidad Appwise</h1>
    <form class="form" action="#">
        <label for="nombreCompleto">Nombre Completo:</label><br>
        <input class="inputT" type="text" id="nombreCompleto" name="nombreCompleto" required ><br><br>

        <label for="email">Correo Electrónico:</label><br>
        <input class="inputT" type="email" id="email" name="email" required><br><br>

        <label for="password">Contraseña:</label><br>
        <input class="inputT" type="password" id="password" name="password" required><br><br>

        <label for="fechaNacimiento">Fecha de Nacimiento</label><br>
        <input class="inputT" type="date" id="fechaNacimiento" name="fechaNacimiento" required><br><br>

        <label for="nivelProgramacion">Nivel de Programación</label><br>
        <select id="nivelProgramacion" name="nivelProgramacion" required>
            <option value="Trainee">Trainee</option>
            <option value="Junior">Junior</option>
            <option value="Semi-Senior">Semi-Senior</option>
        </select><br><br>
        <h3>¿Cuál es tu especialidad favorita?</h3>

        <label>
            <input type="radio" id="front" name="frontBack" value="Front-end">
            Frontend (Diseño e interfaz)
        </label>
        <br>
        <label>
            <input type="radio" id="back" name="frontBack" value="Back-end">
            Backend (Lógica y bases de datos)
        </label>
        <br><br>
        <label>
            <input type="checkbox" id="acepto" name="cbAcepto" value="Acepto" required>
            Acepto los términos y condiciones de la academia
        </label>
        <br><br>
        <div class="buttonCrear">
            <button class="buttonCrear" type="submit">Crear Cuenta</button>
        </div>
    </form>
</body>
</html>
