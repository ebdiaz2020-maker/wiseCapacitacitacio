<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Appwise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Appwise Store</h1>
        <button class="boton-header" id="agregarAlCarro">Ver Carrito (2)</button>
    </header>
    <main>
        <section>
            <h2> Nuestros Productos </h2>
            <ul class = "ul-productos">
                <li> 
                    <div>                        
                        <img src="assets/auricular_gamer.webp" alt="Auricular Gamer" width="150" height="150" />
                        <h3>Auriculares</h3> 
                        <p><b class = "texto-producto-precio">$49.99</b></p>
                        <button class = "btn-productos" id="AddAuricular">Agregar al Carrito</button>
                    </div>
                </li>
                <li> 
                    <div>                        
                        <img src="assets/mouse_gamer.webp" alt="Mouse Gamer" width="150" height="150" />
                        <h3>Mouse Gamer</h3>
                        <p><b class = "texto-producto-precio">$39.99</b></p> 
                        <button class = "btn-productos" id="AddRaton">Agregar al Carrito</button>
                    </div>
                </li>
                <li> 
                    <div>                        
                        <img src="assets/teclado_mecanico.webp" alt="Teclado Mecánico" width="150" height="150" />
                        <h3>Teclado Mecánico</h3>
                        <p><b class = "texto-producto-precio">$77.99</b></p>
                        <button class = "btn-productos" id="AddTeclado">Agregar al Carrito</button>
                    </div>
                </li>
            </ul>
        </section>
        <aside>
            <h2>Resumen de Compras</h2>
            <ul class = "ul-inferior">
                <li>
                    Auriculares - $49.99
                    <button id="eliminarAuricular">x</button>
                </li>
                <li>
                    Mouse Gamer - $39.99
                    <button id="eliminarRaton">x</button>
                </li>
            </ul>
            <hr>
            <h3>Total: $89.98</h3>
            <button class = "btn-resumenCompras" id="finalizarCompra">Finalizar Compra</button>
        </aside>
    </main>
</body>
</html>
